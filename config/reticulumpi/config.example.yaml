    #    interval: 300

    # Emergency Broadcast — mesh-wide flood-style priority messaging.
    # Messages propagate across the mesh via announce re-broadcasting with TTL.
    #emergency_broadcast:
    #  enabled: false
    #  max_ttl: 5                      # Maximum hops for message propagation
    #  max_stored_messages: 100        # Local message buffer size
    #  rebroadcast: true               # Re-broadcast received emergencies
    #  rebroadcast_delay: 5            # Seconds to wait before re-broadcasting

    # Example scaffold plugin (disabled by default).
