# ReticulumPi Application Configuration
# Copy to ~/.config/reticulumpi/config.yaml and edit as needed.

reticulumpi:
  # A friendly name for this node. Used by NomadNet, LXMF Echo, and announces.
  # Defaults to "ReticulumPi-<hostname>" if not set, so every node is unique.
  # Change this to something meaningful for your node!
  #node_name: MyNode

  # Path to Reticulum config directory.
  # Set to null to use the default (~/.reticulum).
  reticulum_config_dir: null

  # Connect to a shared rnsd instance (true) or run Reticulum standalone (false).
  # If true, rnsd must be running. If false, reticulumPi opens interfaces directly.
  # Use false for a dedicated node; use true if also running Sideband, NomadNet, etc.
  use_shared_instance: false

  # Path to the persistent node identity file.
  # Created automatically on first run.
  identity_path: ~/.config/reticulumpi/identity

  # Reticulum log level: 0=critical 1=error 2=warning 3=notice 4=info 5=verbose 6=debug 7=extreme
  log_level: 4

  # Additional directories to scan for plugin .py files.
  # The built-in plugins/ directory is always scanned.
  plugin_paths: []
  #  - /path/to/custom_plugins

  # Plugin configuration. Each key is a plugin_name.
  # Set enabled: true to activate a plugin.
  plugins:

    heartbeat_announce:
      enabled: true
      interval_seconds: 300
      app_name: reticulumpi
      aspects:
        - node
        - heartbeat
      include_telemetry: true

    message_echo:
      enabled: true
      #display_name: "MyNode Echo"  # Defaults to "<node_name> Echo"
      storage_path: ~/.local/share/reticulumpi/lxmf

    # Info Bot — responds to LXMF commands with internet-sourced info.
    # Send "!help" for a list of commands, "!weather <city>" for weather.
    #info_bot:
    #  enabled: false
    #  display_name: "MyNode Info"  # Defaults to "<node_name> Info"
    #  storage_path: ~/.local/share/reticulumpi/info_bot_lxmf

    system_monitor:
      enabled: true
      collect_interval_seconds: 60
      metrics:
        - cpu_percent
        - cpu_temp
        - memory_percent
        - disk_percent

    # NomadNet page server — serves pages/files over Reticulum.
    # Requires: pip install nomadnet
    # Note: When enabled alongside reticulumPi, both apps need a shared
    # rnsd instance. Set use_shared_instance: true above.
    #nomadnet_server:
    #  enabled: false
    #  config_dir: ~/.nomadnet
    #  node_name: MyNode  # Defaults to top-level node_name
    #  enable_propagation: false
    #  health_check_interval: 10
    #  auto_restart: true
    #  max_restarts: 5

    # MeshChat web UI — web-based chat over Reticulum/LXMF.
    # Requires: --with-meshchat during bootstrap, or manual install.
    # When enabled, set use_shared_instance: true above.
    #meshchat_server:
    #  enabled: false
    #  install_dir: /opt/reticulumpi/meshchat
    #  host: "0.0.0.0"
    #  port: 8000
    #  storage_dir: /opt/reticulumpi/meshchat/storage
    #  health_check_interval: 10
    #  auto_restart: true
    #  max_restarts: 5

    # Web Dashboard — secure web UI for node monitoring.
    # Requires: pip install aiohttp (or --with-dashboard during bootstrap).
    # Password priority: env var > config > auto-generate on first start.
    #   Env var:  RETICULUMPI_DASHBOARD_PASSWORD or _PASSWORD_HASH
    #   Config:   password_hash below (generate with: reticulumpi --hash-password)
    #   Auto:     logged once on first start, hash saved to ~/.config/reticulumpi/dashboard_secret
    #   Reset:    delete ~/.config/reticulumpi/dashboard_secret and restart
    #web_dashboard:
    #  enabled: false
    #  host: "127.0.0.1"          # Bind to localhost only (change to 0.0.0.0 to expose)
    #  port: 8080
    #  # password_hash: "scrypt:..."  # Optional — overrides auto-generated password
    #  session_timeout: 86400      # Session lifetime in seconds (default: 24h)
    #  max_sessions: 5
    #  metrics_interval: 5         # WebSocket push interval in seconds
    #  max_websocket_clients: 10
    #  ssl:
    #    enabled: false
    #    cert_file: null
    #    key_file: null
    #    auto_generate: false      # Auto-generate self-signed cert
    #    cert_dir: ~/.config/reticulumpi/web_certs

    # Network Map — passively monitors announces to build mesh topology.
    # Discovers all reachable nodes and tracks hop counts over time.
    #network_map:
    #  enabled: false
    #  db_path: ~/.local/share/reticulumpi/network_map.db
    #  max_history_days: 30

    # Mesh Telemetry — broadcasts system metrics over Reticulum announces.
    # Other nodes running this plugin can see your node's health.
    #mesh_telemetry:
    #  enabled: false
    #  announce_interval: 300
    #  include_metrics: [cpu_percent, cpu_temp, memory_percent, disk_percent]
    #  store_history: true

    # Remote Control — manage this node over Reticulum Links (no IP needed).
    # Only identities in allowed_identities can connect.
    # Get your identity hash with: rnid (or from the dashboard)
    #remote_control:
    #  enabled: false
    #  allowed_identities:
    #    - "your_identity_hash_here"
    #  log_buffer_lines: 500

    # Alert System — sends LXMF messages when thresholds are breached.
